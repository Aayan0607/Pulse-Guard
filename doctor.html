<!DOCTYPE html>
<html>

<head>
  <title>Doctor Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="dr-body">

<div class="dr-container">

  <!-- Header -->
  <header class="dr-header">
    <h1 class="dr-title">Doctor Dashboard</h1>
  </header>

  <!-- Patient Selector -->
  <section class="dr-section">
    <h3 class="dr-section-title">Select Patient</h3>
    <select id="patientSelect" class="dr-select"></select>
  </section>

  <!-- Patient Status -->
  <section class="dr-section dr-status-card">

    <h2 class="dr-section-title">Patient Status</h2>

    <p class="dr-status-item">
      <strong>Risk Level:</strong> 
      <span id="risk" class="dr-risk dr-risk-normal">Normal</span>
    </p>

    <p class="dr-status-item">
      <strong>Insight:</strong> 
      <span id="insight" class="dr-insight">Analyzing...</span>
    </p>

    <p class="dr-status-item">
      <strong>Health Score:</strong> 
      <span id="score" class="dr-score">100</span>
    </p>

  </section>

  <!-- Charts -->
  <section class="dr-section">
    <h2 class="dr-section-title">Blood Pressure</h2>
    <div class="dr-chart-container">
      <canvas id="bpChart"></canvas>
    </div>
  </section>

  <section class="dr-section">
    <h2 class="dr-section-title">SpO₂</h2>
    <div class="dr-chart-container">
      <canvas id="spo2Chart"></canvas>
    </div>
  </section>

  <hr class="dr-divider">

  <section class="dr-section">
    <h2 class="dr-section-title">Lifetime Trend</h2>
    <div class="dr-chart-container">
      <canvas id="lifetimeChart"></canvas>
    </div>
  </section>

</div>

<script type="module" src="doctor.js"></script>

</body>
</html>
