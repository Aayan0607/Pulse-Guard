<!DOCTYPE html>
<html>
<head>
  <title>Patient Registration</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="ptf-body">

<div class="ptf-container">

  <!-- Header -->
  <header class="ptf-header">
    <h1 class="ptf-title">Patient Registration</h1>
  </header>

  <hr class="ptf-divider">

  <!-- Form Section -->
  <section class="ptf-form-section">

    <div class="ptf-form-group">
      <input 
        id="name" 
        class="ptf-input"
        placeholder="Full Name"
      >
    </div>

    <div class="ptf-form-group">
      <input 
        id="age" 
        type="number" 
        class="ptf-input"
        placeholder="Age"
      >
    </div>

    <div class="ptf-form-group">
      <input 
        id="condition" 
        class="ptf-input"
        placeholder="Condition (e.g. Hypertension)"
      >
    </div>

    <!-- Doctor Assignment -->
    <div class="ptf-form-group">
      <input 
        id="doctorId" 
        class="ptf-input"
        placeholder="Doctor Email (Assigned Doctor)"
      >
    </div>

    <div class="ptf-btn-group">
      <button class="ptf-btn ptf-submit-btn" onclick="registerPatient()">
        Start Monitoring
      </button>
    </div>

  </section>

</div>

<script type="module" src="patient.js"></script>

</body>
</html>
